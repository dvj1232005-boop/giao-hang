<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<title>Nhật ký giao hàng</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = { darkMode: 'class' }
</script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-white text-base">

<div class="max-w-md mx-auto">

<!-- HEADER -->
<div class="bg-white dark:bg-gray-900 p-4 shadow flex justify-between items-center sticky top-0 z-10">
<div>
<h1 class="text-xl font-bold">🚚 Giao hàng</h1>
<p class="text-sm text-gray-500 dark:text-gray-400">👤 <span id="user"></span></p>
</div>

<div class="flex gap-2">
<button onclick="toggleDark()" class="px-2">🌙</button>
<button onclick="openManager()" class="px-2">📊</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="grid grid-cols-3 gap-2 p-3">
<div class="bg-white dark:bg-gray-800 p-2 rounded text-center shadow">
<p class="text-xs">Đơn</p>
<p id="tongDon">0</p>
</div>

<div class="bg-white dark:bg-gray-800 p-2 rounded text-center shadow">
<p class="text-xs">Tiền</p>
<p id="tongTien">0</p>
</div>

<div class="bg-white dark:bg-gray-800 p-2 rounded text-center shadow">
<p class="text-xs">Km</p>
<p id="tongKm">0</p>
</div>
</div>

<!-- LIST -->
<div id="list" class="p-3 space-y-2 pb-32"></div>

<!-- FORM -->
<div class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 p-3 border-t">

<div class="flex gap-2 mb-2">
<input id="km" type="number" placeholder="Km"
class="flex-1 border p-2 rounded text-base bg-white dark:bg-gray-700">

<input id="gia" type="number" placeholder="Giá"
class="flex-1 border p-2 rounded text-base bg-white dark:bg-gray-700">
</div>

<input id="diachi" placeholder="Địa chỉ"
class="border p-2 rounded w-full mb-2 text-base bg-white dark:bg-gray-700">

<button onclick="add()" class="bg-green-500 text-white w-full py-3 rounded">
➕ Thêm đơn
</button>

</div>

<!-- PIN -->
<div id="pinBox" class="hidden p-4 text-center">
<input id="pinInput" type="password" placeholder="Nhập PIN"
class="border p-2 w-full mb-2">
<button onclick="checkPin()" class="bg-purple-500 text-white w-full py-2">
Xác nhận
</button>
</div>

<!-- MANAGER -->
<div id="manager" class="hidden p-3"></div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSy...",
databaseURL: "https://giao-hang-35556-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// USER
let user = localStorage.getItem("user") || prompt("Nhập tên:");
localStorage.setItem("user", user);
document.getElementById("user").innerText = user;

// DARK MODE
function toggleDark(){
document.documentElement.classList.toggle("dark");
}

// TÍNH TIỀN
function calc(km, gia){
km = Math.round(km);
if(gia >= 300) return 0;
if(km <= 1) return 5;
return (km - 1) * 5;
}

// ADD
function add(){
let km = Number(document.getElementById("km").value);
let gia = Number(document.getElementById("gia").value);
let diachi = document.getElementById("diachi").value;

db.ref("orders").push({
user,
km: Math.round(km),
gia,
diachi,
tien: calc(km, gia),
time: new Date().toLocaleString()
});

load();
}

// LOAD USER
function load(){
db.ref("orders").once("value", snap=>{
let data = snap.val();
let html="", d=0,t=0,k=0;

for(let id in data){
let o=data[id];
if(o.user!=user) continue;

d++; t+=o.tien; k+=o.km;

html+=`
<div class="bg-white dark:bg-gray-800 p-3 rounded shadow">
${o.km}km - ${o.gia}k - 💰${o.tien}k
</div>`;
}

document.getElementById("list").innerHTML=html;
document.getElementById("tongDon").innerText=d;
document.getElementById("tongTien").innerText=t;
document.getElementById("tongKm").innerText=k;
});
}

// MANAGER
function openManager(){
document.getElementById("pinBox").classList.remove("hidden");
}

function checkPin(){
if(document.getElementById("pinInput").value!="2005"){
alert("Sai PIN"); return;
}
document.getElementById("manager").classList.remove("hidden");

db.ref("orders").once("value",snap=>{
let data=snap.val(), map={}, html="";

for(let id in data){
let o=data[id];
if(!map[o.user]) map[o.user]={km:0,tien:0,don:0,list:[]};

map[o.user].km+=o.km;
map[o.user].tien+=o.tien;
map[o.user].don++;
map[o.user].list.push(o);
}

for(let u in map){
let m=map[u];

html+=`
<div class="bg-white dark:bg-gray-800 p-3 mb-2 rounded">
<b>${u}</b> - 📦${m.don} - 📍${m.km}km - 💰${m.tien}k
<button onclick="toggle('${u}')" class="float-right">⋮</button>

<div id="${u}" class="hidden">
${m.list.map(i=>`<div>${i.km}km - ${i.tien}k</div>`).join("")}
</div>
</div>`;
}

document.getElementById("manager").innerHTML=html;
});
}

function toggle(u){
let el=document.getElementById(u);
el.classList.toggle("hidden");
}

// INIT
load();
</script>

</body>
</html>
